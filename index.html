        .ball {
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1e40af, #1e3a8a);
            font-weight: 800; font-size: 0.9rem; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .hot { border: 2px solid #ef4444; position: relative; }
        .hot::after { content: '🔥'; position: absolute; top: -10px; right: -5px; font-size: 10px; }
        .cold { border: 2px solid #3b82f6; position: relative; }
        .cold::after { content: '❄️'; position: absolute; top: -10px; right: -5px; font-size: 10px; }
        .mode-card { border: 1px solid #1e293b; transition: all 0.2s; }

        let userHistory = JSON.parse(localStorage.getItem('officialHistory')) || [];

        function getFullHistory() {
            return [...userHistory, ...baselineHistory];
        }

        function setMode(m) {
            currentMode = m;
            document.querySelectorAll('.mode-card').forEach(b => b.classList.remove('mode-selected'));
            document.getElementById('btn-' + m).classList.add('mode-selected');
            const info = {
                random: "Mod: Aleatoriu (Suma 115-185, 2-4 Pare)",
                sectors: "Mod: Sectoare (Distribuție egală pe bilet)",
                hc: "Mod: Hot/Cold (3 Hot + 2 Cold + 1 Random)"
            };
            document.getElementById('algo-info').innerText = info[m];
        }

        function calculateHC() {
            let counts = {};
            for(let i=1; i<=49; i++) counts[i] = 0;

            const historyData = getFullHistory();
            historyData.forEach(draw => draw.forEach(n => {
                if(counts[n] !== undefined) counts[n]++;
            }));

            let sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
            return {
                hot: sorted.slice(0, 10).map(x => parseInt(x[0])),
                cold: sorted.slice(-10).reverse().map(x => parseInt(x[0]))
            };
        }

        function genereazaSectoare() {
            let res = [];
            res.push(..._.sampleSize(_.range(1, 17), 2));
            res.push(..._.sampleSize(_.range(17, 33), 2));
            res.push(..._.sampleSize(_.range(33, 50), 2));
            return res.sort((a,b) => a-b);
        }

        const _ = {
            range: (start, end) => Array.from({length: end - start}, (v, k) => k + start),
            sampleSize: (arr, n) => [...arr].sort(() => 0.5 - Math.random()).slice(0, n)
        };

        function handleGenerate() {
            let finalNumbers = [];
            const hc = calculateHC();
            let attempts = 0;

            while (attempts < 2000) {
                if (currentMode === 'random') {
                    finalNumbers = _.sampleSize(_.range(1, 50), 6);
                } else if (currentMode === 'sectors') {
                    finalNumbers = genereazaSectoare();
                } else if (currentMode === 'hc') {
                    let h = _.sampleSize(hc.hot, 3);
                    let c = _.sampleSize(hc.cold, 2);
                    let r = _.sampleSize(_.range(1, 50).filter(x => !h.includes(x) && !c.includes(x)), 1);
                    finalNumbers = [...h, ...c, ...r];
                }

                finalNumbers.sort((a,b) => a-b);

                let sum = finalNumbers.reduce((a, b) => a + b, 0);
                let evens = finalNumbers.filter(n => n % 2 === 0).length;

                if (currentMode !== 'random' || (sum >= 115 && sum <= 185 && evens >= 2 && evens <= 4)) {
                    break;
                }
                attempts++;
            }

            displayBalls(finalNumbers, hc);
        }

        function displayBalls(nums, hc) {
            const container = document.getElementById('resultBox');
            const display = document.getElementById('ballsDisplay');
            container.classList.remove('hidden');
            display.innerHTML = nums.map(n => {
                let cls = '';
                if(hc.hot.includes(n)) cls = 'hot';
                if(hc.cold.includes(n)) cls = 'cold';
                return `<div class="ball ${cls}">${n}</div>`;
            }).join('');
        }

        function addNewDraw() {
            const val = document.getElementById('newDraw').value;
            const nums = val.split(/[, ]+/).map(x => parseInt(x.trim())).filter(x => x >= 1 && x <= 49);
            const uniqueNums = [...new Set(nums)];

            if(uniqueNums.length === 6) {
                userHistory.unshift(uniqueNums);
                localStorage.setItem('officialHistory', JSON.stringify(userHistory));
                alert("Extragere salvată! Date reale adăugate în istoric.");
                document.getElementById('newDraw').value = '';
                updateAnalysisPanel();
            } else {
                alert("Introdu exact 6 numere unice între 1 și 49, separate prin virgulă.");
            }
        }

        function updateAnalysisPanel() {
            const hc = calculateHC();
            const panel = document.getElementById('analysisPanel');
            const totalDraws = getFullHistory().length;

            panel.innerHTML = `
                <div class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-2 text-center">
                    Bază de date: ${totalDraws} extrageri REALE (2024-2026)
                </div>
                <div class="flex justify-between text-[11px] font-mono bg-black/40 p-2 rounded-xl">
                    <div class="text-red-400">🔥 HOT: ${hc.hot.slice(0, 5).join(', ')}</div>
                    <div class="text-blue-400">❄️ COLD: ${hc.cold.slice(0, 5).join(', ')}</div>
                </div>
            `;
        }
