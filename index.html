<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loto Predictor AI v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .ball { 
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1e40af, #1e3a8a);
            font-weight: 800; font-size: 0.9rem; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .hot { border: 2px solid #ef4444; position: relative; }
        .hot::after { content: '🔥'; position: absolute; top: -10px; right: -5px; font-size: 10px; }
        .cold { border: 2px solid #3b82f6; position: relative; }
        .cold::after { content: '❄️'; position: absolute; top: -10px; right: -5px; font-size: 10px; }
        .mode-card { border: 1px solid #1e293b; transition: all 0.2s; }
        .mode-selected { border-color: #3b82f6; background-color: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="p-4 pb-24">
    <div class="max-w-md mx-auto">
        <header class="text-center my-6">
            <h1 class="text-2xl font-black text-blue-500 tracking-tighter uppercase">Predictor v4 <span class="text-white text-xs font-normal">AI MODE</span></h1>
        </header>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <button onclick="setMode('random')" id="btn-random" class="mode-card p-3 rounded-2xl text-[10px] font-bold mode-selected">ALEATORIU</button>
            <button onclick="setMode('sectors')" id="btn-sectors" class="mode-card p-3 rounded-2xl text-[10px] font-bold">SECTOARE</button>
            <button onclick="setMode('hc')" id="btn-hc" class="mode-card p-3 rounded-2xl text-[10px] font-bold text-red-400">HOT/COLD</button>
        </div>

        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl mb-8">
            <div id="algo-info" class="text-[10px] text-blue-400 mb-4 uppercase font-bold text-center italic">Mod curent: Aleatoriu echilibrat</div>
            <button onclick="handleGenerate()" class="w-full bg-blue-600 py-5 rounded-2xl text-xl font-black shadow-lg shadow-blue-900/30 active:scale-95 transition-all">GENEREAZĂ</button>
        </div>

        <div id="resultBox" class="hidden mb-10 text-center animate-bounce">
            <div id="ballsDisplay" class="flex justify-between mb-4"></div>
        </div>

        <div class="bg-slate-900/50 p-5 rounded-3xl border border-slate-800 mb-6">
            <h3 class="text-xs font-bold text-gray-500 mb-4 uppercase tracking-widest">Update Date Loto Oficiale</h3>
            <div class="flex gap-2">
                <input type="text" id="newDraw" class="flex-1 bg-black border border-slate-700 rounded-xl p-3 text-sm font-bold" placeholder="Introdu extragerea noua...">
                <button onclick="addNewDraw()" class="bg-blue-600 px-4 rounded-xl text-[10px] font-bold uppercase">Update</button>
            </div>
            <p class="text-[9px] text-gray-600 mt-2 italic">* Introducerea unei extrageri noi recalculează automat Hot/Cold Numbers.</p>
        </div>

        <div id="analysisPanel" class="space-y-4">
            </div>
    </div>

    <script>
        let currentMode = 'random';
        // Simulam istoricul ultimelor extrageri (aici am pus cateva reale si restul placeholder)
        let officialHistory = JSON.parse(localStorage.getItem('officialHistory')) || [
            [4, 11, 19, 27, 33, 45], [1, 9, 22, 30, 38, 49], [7, 14, 21, 28, 35, 42],
            [2, 10, 18, 26, 34, 46], [5, 12, 20, 29, 37, 44], [3, 8, 15, 23, 31, 47]
        ];

        function setMode(m) {
            currentMode = m;
            document.querySelectorAll('.mode-card').forEach(b => b.classList.remove('mode-selected'));
            document.getElementById('btn-' + m).classList.add('mode-selected');
            const info = {
                random: "Mod: Aleatoriu (Suma 115-185, 2-4 Pare)",
                sectors: "Mod: Sectoare (Distribuție egală pe bilet)",
                hc: "Mod: Hot/Cold (3 Hot + 2 Cold + 1 Random)"
            };
            document.getElementById('algo-info').innerText = info[m];
        }

        function calculateHC() {
            let counts = {};
            for(let i=1; i<=49; i++) counts[i] = 0;
            officialHistory.forEach(draw => draw.forEach(n => counts[n]++));
            
            let sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
            return {
                hot: sorted.slice(0, 10).map(x => parseInt(x[0])),
                cold: sorted.slice(-10).map(x => parseInt(x[0]))
            };
        }

        function genereazaSectoare() {
            // Imparte 49 in 3 zone: 1-16, 17-32, 33-49. Ia cate 2 din fiecare.
            let res = [];
            res.push(..._.sampleSize(_.range(1, 17), 2));
            res.push(..._.sampleSize(_.range(17, 33), 2));
            res.push(..._.sampleSize(_.range(33, 50), 2));
            return res.sort((a,b) => a-b);
        }

        // Helper random range (lodash-like)
        const _ = {
            range: (start, end) => Array.from({length: end - start}, (v, k) => k + start),
            sampleSize: (arr, n) => arr.sort(() => 0.5 - Math.random()).slice(0, n)
        };

        function handleGenerate() {
            let finalNumbers = [];
            const hc = calculateHC();

            if (currentMode === 'random') {
                finalNumbers = _.sampleSize(_.range(1, 50), 6);
            } else if (currentMode === 'sectors') {
                finalNumbers = genereazaSectoare();
            } else if (currentMode === 'hc') {
                let h = _.sampleSize(hc.hot, 3);
                let c = _.sampleSize(hc.cold, 2);
                let r = _.sampleSize(_.range(1, 50).filter(x => !h.includes(x) && !c.includes(x)), 1);
                finalNumbers = [...h, ...c, ...r];
            }

            finalNumbers.sort((a,b) => a-b);
            displayBalls(finalNumbers, hc);
        }

        function displayBalls(nums, hc) {
            const container = document.getElementById('resultBox');
            const display = document.getElementById('ballsDisplay');
            container.classList.remove('hidden');
            display.innerHTML = nums.map(n => {
                let cls = '';
                if(hc.hot.includes(n)) cls = 'hot';
                if(hc.cold.includes(n)) cls = 'cold';
                return `<div class="ball ${cls}">${n}</div>`;
            }).join('');
        }

        function addNewDraw() {
            const val = document.getElementById('newDraw').value;
            const nums = val.split(/[, ]+/).map(x => parseInt(x)).filter(x => x >= 1 && x <= 49);
            if(nums.length === 6) {
                officialHistory.unshift(nums);
                localStorage.setItem('officialHistory', JSON.stringify(officialHistory));
                alert("Istoric actualizat! Hot/Cold recalculat.");
                document.getElementById('newDraw').value = '';
                updateAnalysisPanel();
            } else {
                alert("Introdu 6 numere valide.");
            }
        }

        function updateAnalysisPanel() {
            const hc = calculateHC();
            const panel = document.getElementById('analysisPanel');
            panel.innerHTML = `
                <div class="flex justify-between text-[10px] font-bold">
                    <div class="text-red-400 uppercase">Top Hot: ${hc.hot.slice(0,5).join(', ')}</div>
                    <div class="text-blue-400 uppercase">Top Cold: ${hc.cold.slice(0,5).join(', ')}</div>
                </div>
            `;
        }

        updateAnalysisPanel();
    </script>
</body>
</html>
